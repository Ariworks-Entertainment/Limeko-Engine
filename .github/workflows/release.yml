name: Release
on:
  push:
    branches:
      - release
jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: limeko-windows
          - os: ubuntu-latest
            rid: linux-x64
            artifact: limeko-linux
          - os: macos-latest
            rid: osx-x64
            artifact: limeko-macos
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Publish
        run: >
          dotnet publish Limeko/Limeko/Limeko.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -o ./publish/${{ matrix.rid }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ./publish/${{ matrix.rid }}/
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
      - name: Zip build outputs
        run: |
          cd artifacts
          zip -r limeko-windows.zip limeko-windows/
          zip -r limeko-linux.zip limeko-linux/
          zip -r limeko-macos.zip limeko-macos/
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Limeko — ${{ github.sha }}"
          body: |
            Automated release from commit ${{ github.sha }}.
            **Downloads:**
            - limeko-windows.zip — Windows x64
            - limeko-linux.zip — Linux x64
            - limeko-macos.zip — macOS x64
          files: |
            artifacts/limeko-windows.zip
            artifacts/limeko-linux.zip
            artifacts/limeko-macos.zip
          draft: false
          prerelease: false
